name: 🛡️ Enterprise Gatekeeper (CI)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Verhindert, dass alte, fehlerhafte Pipelines weiterlaufen, wenn neuer Code gepusht wird
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-compliance:
    name: Go Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./biometrics-cli
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'biometrics-cli/go.mod'
          cache: true

      - name: Download Dependencies
        run: go mod download

      - name: 🚨 Format Check (Strict)
        run: |
          if [ "$(go fmt ./...)" ]; then
            echo "Fehler: Code ist nicht nach Go-Standards formatiert!"
            exit 1
          fi

      - name: 🚨 Static Analysis (go vet)
        run: go vet ./...

      - name: 🧪 Run Unit Tests & Race Detector
        run: go test -v -race ./...

      - name: 🏗️ Dry-Run Build
        run: go build -v ./...

  frontend-compliance:
    name: Next.js Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Content Tests
        run: pnpm test:content

      - name: 🏗️ Production Build Test
        # Ein Next.js Build fällt sofort durch, wenn es tote Links, fehlende Typen oder kaputte UI-Komponenten gibt
        run: pnpm build
